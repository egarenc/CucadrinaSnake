<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CucadrinasSnake Web Game</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="ico_cucadrinas.ico">
</head>
<body>

    <div id="pantalla-bienvenida" class="escena activa">
        <h1>🐍 CucaSnake Joc Web 🐲</h1>
        <button id="btn-continuar">CONTINUAR</button>
        <button id="btn-ranking" style="background-color: #2196F3;">RANKING</button>
        <button id="btn-feedback" class="btn-neutral">FEEDBACK</button>
        <div class="contenedor-mascara-cabeza">
        <img src="cabeza.jpg" alt="Cucadrinas" class="imagen-cabeza-menu">
        </div>
        <h2>Ajuda la Cucadrinas a menjarse tots els entrebancs per poder tenir el seu nou edifici cau!</h2>
    </div>

    <div id="pantalla-opciones" class="escena">
        <h2>Configuració</h2>
        
        <div class="control-group">
            <label>🔊 SO</label>
            <label class="switch">
                <input type="checkbox" id="toggle-sonido" checked>
                <span class="slider"></span>
            </label>
        </div>
        
        <div class="control-group">
            <label for="slider-dureza">🚩DIFICULTAT</label>
            <input type="range" id="slider-dureza" min="1" max="10" value="5">
        </div>
        
        <button id="btn-iniciar">INICIAR PARTIDA</button>
        <button id="btn-volver-opciones" class="btn-neutral">TORNAR</button>
    </div>

    <div id="pantalla-juego" class="escena">
        <div id="marcador">
            <span>Captures: <span id="ui-captures">0</span></span>
            <span>Temps: <span id="ui-tiempo">00:00</span></span>
        </div>
        
        <canvas id="game-canvas" width="640" height="640"></canvas>

        <div class="dpad-contenedor">
            <button id="dpad-arriba" class="btn-dpad">▲</button>
            <button id="dpad-izq" class="btn-dpad">◀</button>
            <button id="dpad-der" class="btn-dpad">▶</button>
            <button id="dpad-abajo" class="btn-dpad">▼</button>
        </div>
        
        <button id="btn-salir" class="btn-peligro">SORTIR</button>
    </div>

    <div id="custom-modal" class="modal-overlay">
    <div class="modal-content">
        <p id="modal-mensaje">Missatge de prova</p>
        
        <div id="modal-ranking-form" style="display: none; margin-bottom: 20px;">
            <label for="modal-iniciales" style="display:block; margin-bottom:8px; font-size:14px; color:#4CAF50;">INTRODUEIX LES TEVES INICIALS (MÀX. 6):</label>
            <input type="text" id="modal-iniciales" maxlength="6" style="text-transform: uppercase; padding: 8px; text-align: center; font-size: 16px; border-radius: 4px; border: 1px solid #4CAF50; background: #1a1a1a; color: white; width: 80%; max-width: 200px; margin-bottom: 10px;">
            <button id="modal-btn-enviar" style="width: auto; min-width: 120px; background-color: #4CAF50; padding: 10px 20px; margin: 5px auto; display: block;">ENVIAR RANKING</button>
        </div>

        <button id="modal-btn-cerrar">OK</button>
    </div>
    </div>
    

    <script src="game.js"></script>
</body>
</html>
